version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/adapters/db/queries"
    schema: "internal/adapters/db/migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/adapters/db/sqlc"
        sql_package: "database/sql"
        emit_interface: true
        emit_json_tags: false
        emit_prepared_queries: false
        emit_exact_table_names: false
