name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs on new pushes to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ------------------------------------------------------------------
  # Detect what changed to skip irrelevant jobs (saves CO2 + minutes)
  # ------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad7274537fb89643270de58 # v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'go.*'
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            docs:
              - 'docs/**'
              - '*.md'

  # ------------------------------------------------------------------
  # Lint commit messages on PRs (Conventional Commits)
  # ------------------------------------------------------------------
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b16867373f1d3c509b55267885b52a9263435489 # v6.1.2

  # ------------------------------------------------------------------
  # Backend Go: lint, test, build, security scan
  # ------------------------------------------------------------------
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        # We use 'go install' instead of the official action because Go 1.26.2 is very new
        # and pre-built binaries might still be built with an older Go version.
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          $(go env GOPATH)/bin/golangci-lint run ./cmd/... ./internal/...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          $(go env GOPATH)/bin/gosec -fmt sarif -out gosec.sarif ./cmd/... ./internal/... || true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./cmd/... ./internal/...
      - name: tests
        run: go test -race -coverprofile=coverage.out ./cmd/... ./internal/...
      - name: build
        run: go build -o /tmp/komunumo-api ./cmd/server
      - name: upload coverage
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: backend-coverage
          path: backend/coverage.out

  # ------------------------------------------------------------------
  # Frontend Next.js: lint, typecheck, test, build
  # ------------------------------------------------------------------
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      KOMUNUMO_API_INTERNAL_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fe436284f6f87ca68340798e16cc075f12e84d7a # v4.0.0
        with:
          version: 9
      - uses: actions/setup-node@1d1121627393930939b7f0e1c5c73d249a15215a # v4.1.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: lighthouse-ci
        run: npx --yes @lhci/cli@0.14.0 autorun
        continue-on-error: true

  # ------------------------------------------------------------------
  # Docs: lint markdown, validate Mermaid + OpenAPI
  # ------------------------------------------------------------------
  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@05f3277d0a927a947fa90124709be39314da2735 # v17.0.1
        with:
          globs: 'docs/**/*.md'
      - name: validate OpenAPI
        continue-on-error: true
        run: npx --yes @redocly/cli@latest lint docs/specs/03-api/openapi.yaml
      - name: validate Mermaid
        continue-on-error: true
        run: |
          for f in docs/diagrams/*.mmd docs/specs/04-data/*.mmd; do
            npx -p @mermaid-js/mermaid-cli mmdc -p puppeteer-config.json -i "$f" -o /tmp/$(basename "$f" .mmd).svg
          done

  # ------------------------------------------------------------------
  # Container scan (only when Dockerfiles touched)
  # ------------------------------------------------------------------
  trivy:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: trivy fs scan
        uses: aquasecurity/trivy-action@18f259c5e2803d4d68202c2e061b6c697d81249f # v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  # ------------------------------------------------------------------
  # CodeQL — SAST GitHub natif (Go + TypeScript). Voir security.md.
  # ------------------------------------------------------------------
  codeql:
    needs: changes
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      - uses: github/codeql-action/init@6628c05988220f78718693a3fd4398150774a9df # v3.25.10
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@6628c05988220f78718693a3fd4398150774a9df # v3.25.10
      - uses: github/codeql-action/analyze@6628c05988220f78718693a3fd4398150774a9df # v3.25.10
        with:
          category: "/language:${{ matrix.language }}"

  # ------------------------------------------------------------------
  # SonarCloud — qualité globale + surveillance du code LLM. Voir ADR-0008.
  # Désactiver : commenter ce job ou supprimer le secret SONAR_TOKEN.
  # ------------------------------------------------------------------
  sonar:
    needs: [backend, frontend]
    if: always() && github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: backend-coverage
          path: backend/
        continue-on-error: true
      - uses: SonarSource/sonarcloud-github-action@393f9ba60367a5e954155b0a31248d8883618452 # v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ------------------------------------------------------------------
  # Quality gate: required jobs must not fail (skipped is OK)
  # ------------------------------------------------------------------
  ci-success:
    needs: [backend, frontend, docs, commitlint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix results
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "Job results: $results"
          if echo "$results" | grep -q failure; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required checks passed (or were skipped)."
