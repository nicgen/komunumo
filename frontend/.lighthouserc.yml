ci:
  collect:
    startServerCommand: "pnpm start"
    startServerReadyPattern: "localhost:3000"
    startServerReadyTimeout: 30000
    url:
      - http://localhost:3000/
    numberOfRuns: 1
  assert:
    assertions:
      "categories:performance":
        - warn
        - minScore: 0.7
      "categories:accessibility":
        - error
        - minScore: 0.8
      "categories:best-practices":
        - warn
        - minScore: 0.8
  upload:
    target: temporary-public-storage
